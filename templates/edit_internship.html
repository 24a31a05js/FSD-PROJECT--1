<!DOCTYPE html>
<html>
<head>
    <title>Edit Internship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <div class="project-header">
        <h1>Student Internship Tracker</h1>
        <p>Internship Management System</p>
    </div>
    <form action="{{ url_for('edit_internship', internship_id=internship.id) }}" method="POST">
        <h2>Edit Internship</h2>

        <label>Company Name:</label>
        <input type="text" name="company" value="{{ internship.company_name }}" required>

        <label>Role:</label>
        <input type="text" name="role" value="{{ internship.role }}" required>

        <label>Start Date:</label>
        <input type="date" name="start_date" value="{{ internship.start_date }}">

        <label>End Date:</label>
        <input type="date" name="end_date" value="{{ internship.end_date }}">

        <label>Status:</label>
        <select name="status">
            <option value="Applied" {% if internship.status == 'Applied' %}selected{% endif %}>Applied</option>
            <option value="Selected" {% if internship.status == 'Selected' %}selected{% endif %}>Selected</option>
            <option value="Ongoing" {% if internship.status == 'Ongoing' %}selected{% endif %}>Ongoing</option>
            <option value="Completed" {% if internship.status == 'Completed' %}selected{% endif %}>Completed</option>
            <option value="Rejected" {% if internship.status == 'Rejected' %}selected{% endif %}>Rejected</option>
        </select>

        <button type="submit" style="margin-top: 20px;">Update Internship</button>
        <a href="{{ url_for('dashboard') }}" style="display: block; text-align: center; margin-top: 10px;">Cancel</a>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <div class="project-header">
        <h1>Student Internship Tracker</h1>
        <p>Internship Management System</p>
    </div>
    <form action="/reset_password" method="POST">
        <h2>Set New Password</h2>
        <p style="text-align: center; color: #666;">Resetting password for: <strong>{{ session['reset_email'] }}</strong></p>
        <br>

        <label>New Password:</label>
        <input type="password" name="password" required>

        <button type="submit">Update Password</button>
        <a href="/login" style="display: block; text-align: center; margin-top: 10px;">Cancel</a>
    </form>
</div>
</body>
</html>

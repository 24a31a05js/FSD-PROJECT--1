<!DOCTYPE html>
<html>
<head>
    <title>Share Experience</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <div class="project-header">
        <h1>Student Internship Tracker</h1>
        <p>Internship Management System</p>
    </div>
    <form action="{{ url_for('add_experience') }}" method="POST">
        <h2>Share Your Internship Experience</h2>

        <label>Company Name:</label>
        <input type="text" name="company" required>

        <label>Interview Experience:</label>
        <textarea name="experience_text" rows="8" placeholder="Describe the interview process, rounds, and questions asked..." required></textarea>

        <label>Tips for Juniors:</label>
        <textarea name="tips" rows="5" placeholder="Any advice on preparation, resources, or things to focus on?"></textarea>

        <button type="submit" style="margin-top: 20px;">Share Experience</button>
        <a href="{{ url_for('dashboard') }}" style="display: block; text-align: center; margin-top: 10px;">Cancel</a>
    </form>
</div>
</body>
</html>
